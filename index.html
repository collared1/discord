<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background-image: url("/discordbackground.svg");
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
      font-family: Arial, Helvetica, sans-serif;
    }

    .logo {
      position: absolute;
      top: 2vh;
      left: 2vw;
      width: 7vw;
    }

    .mainbox {
      width: 420px;
      padding: 40px;
      position: absolute;
      top: 50vh;
      left: 50vw;
      transform: translate(-50%, -50%);
      background-color: #313338;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.35);
      color: #f2f3f5;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #b5bac1;
      margin-bottom: 30px;
    }

    label {
      font-size: 12px;
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
      margin-top: 15px;
      color: #b5bac1;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 4px;
      border: none;
      background-color: #1e1f22;
      color: white;
      font-size: 14px;
      box-sizing: border-box;
    }

    input:focus {
      outline: 2px solid #5865f2;
    }

    .forgot {
      font-size: 12px;
      color: #5865f2;
      margin-top: 8px;
      display: inline-block;
      text-decoration: none;
    }

    .login-btn {
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background-color: #5865f2;
      border: none;
      border-radius: 4px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    .login-btn:hover {
      background-color: #4752c4;
    }

    .register {
      text-align: left;
      font-size: 12px;
      color: #b5bac1;
      margin-top: 15px;
    }

    .register a {
      color: #5865f2;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <img src="/discordlogo.svg" class="logo">

  <div class="mainbox">
    <h1>Welcome back!</h1>
    <div class="subtitle">We're so excited to see you again!</div>

    <label>Email or Phone Number *</label>
    <input type="text">

    <label>Password *</label>
    <input type="password">

    <a href="#" class="forgot">Forgot your password?</a>

    <button class="login-btn">Log In</button>

    <div class="register">
      Need an account? <a href="#">Register</a>
    </div>
  </div>

</body>
</html>
