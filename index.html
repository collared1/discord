<html>
  <head>
    <style>
      body {
        background-image: url("/discordbackground.svg");
        background-repeat: no-repeat;
        background-size: cover;
        background-attachment: fixed;
        background-color: #cccccc;
      }
      html, body {
        overflow: hidden;
        padding: 2vh 2vw;
      }
      .logo {
        width: 7vw;
        height: auto;
      }
      .mainbox {
        width: 47vw;
        height: 50vh;
        position: absolute;
        top: 50vh;
        left: 50vw;
        transform: translate(-50%, -50%);
        background-color: #393a42;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.20);
    </style>
  </head>
  <body>
    <img src="/discordlogo.svg" alt="discord logo" class="logo">

    <div class="mainbox"></div>
  </body>
</html>
